<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butovski App Pro v3.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root, [data-theme="cyberpunk"] {
            --bg-color: #0d0f14;
            --card-bg: #141822;
            --accent-gradient: linear-gradient(135deg, #6366f1, #a855f7);
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: #232a3d;
            --nav-bg: #0a0c10;
            --tv-theme: dark;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #1d4ed8);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --nav-bg: #ffffff;
            --tv-theme: light;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 80px;
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--card-bg);
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .user-info .name {
            font-size: 14px;
            font-weight: 600;
        }

        .user-info .status {
            font-size: 11px;
            color: #22c55e;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .circle-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .container {
            padding: 16px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .asset-selector {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            cursor: pointer;
        }

        .asset-current {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .asset-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #232a3d;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f59e0b;
            font-weight: bold;
        }

        .asset-details .title {
            font-size: 15px;
            font-weight: 600;
        }

        .asset-details .type {
            font-size: 11px;
            color: var(--text-muted);
        }

        .timeframe-container {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 16px;
            scrollbar-width: none;
        }
        .timeframe-container::-webkit-scrollbar { display: none; }

        .tf-btn {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }

        .tf-btn.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
        }

        .signal-monitor {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .monitor-placeholder i {
            font-size: 48px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .monitor-placeholder p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .signal-result {
            display: none;
        }

        .direction-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .direction-badge.up { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .direction-badge.down { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        .gauge-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 16px;
        }

        .gauge-svg {
            transform: rotate(-90deg);
            width: 140px;
            height: 140px;
        }

        .gauge-bg { fill: none; stroke: var(--border-color); stroke-width: 10; }
        .gauge-fill {
            fill: none;
            stroke: url(#gaugeGradient);
            stroke-width: 10;
            stroke-dasharray: 377;
            stroke-dashoffset: 377;
            stroke-linecap: round;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .gauge-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .gauge-text .percent { font-size: 28px; font-weight: 700; }
        .gauge-text .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }

        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loader-steps {
            font-size: 13px;
            color: var(--text-muted);
            height: 20px;
        }

        .action-btn {
            width: 100%;
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .widget-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 16px;
            height: 240px;
            overflow: hidden;
        }

        /* Стилі Нової вкладки Новин та Навчання */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin: 16px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .news-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .news-impact {
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        .news-impact.high { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .news-impact.med { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }

        .news-title { font-size: 13px; font-weight: 600; line-height: 1.4; }

        .edu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .edu-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(99, 102, 241, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6366f1;
            font-size: 18px;
        }

        .profile-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
        }

        .profile-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            margin: 0 auto 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px;
            text-align: center;
        }

        .stat-value { font-size: 16px; font-weight: 700; margin-top: 4px; }
        .stat-label { font-size: 11px; color: var(--text-muted); }

        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background-color: var(--nav-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 500;
            text-decoration: none;
            gap: 4px;
            cursor: pointer;
        }

        .nav-item i { font-size: 20px; }
        .nav-item.active { color: #6366f1; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: flex-end;
        }

        .modal.active { display: flex; }

        .modal-content {
            background-color: var(--card-bg);
            width: 100%;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            max-height: 75vh;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .search-box {
            display: flex;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            width: 100%;
            margin-bottom: 16px;
            gap: 8px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: var(--text-main);
            outline: none;
            width: 100%;
        }

        .asset-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 6px;
        }
        .asset-option:hover, .asset-option.selected {
            background: rgba(99, 102, 241, 0.08);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-badge">
            <div class="user-avatar" id="userAvatarText">U</div>
            <div class="user-info">
                <div class="name" id="userDisplayName">User</div>
                <div class="status" id="statusLabel">Premium Active</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="circle-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
            <button class="circle-btn" onclick="toggleLanguage()"><i class="fas fa-globe"></i></button>
        </div>
    </div>

    <div class="container">
        
        <div id="tab-signals" class="tab-content active">
            <div class="asset-selector" onclick="openAssetModal()">
                <div class="asset-current">
                    <div class="asset-icon" id="currentAssetIcon">$</div>
                    <div class="asset-details">
                        <div class="title" id="currentAssetTitle">EUR / USD</div>
                        <div class="type" id="currentAssetType">Валютна пара (Forex)</div>
                    </div>
                </div>
                <i class="fas fa-chevron-down" style="color: var(--text-muted)"></i>
            </div>

            <div class="timeframe-container" id="timeframeContainer"></div>

            <div class="signal-monitor">
                <div class="monitor-placeholder" id="monitorPlaceholder">
                    <i class="fas fa-robot"></i>
                    <p id="placeholderText">Оберіть актив, інтервал та надішліть запит на аналіз</p>
                </div>

                <div class="loader-container" id="loaderContainer">
                    <div class="spinner"></div>
                    <div class="loader-steps" id="loaderSteps">З'єднання з сервером...</div>
                </div>

                <div class="signal-result" id="signalResult">
                    <div class="direction-badge" id="directionBadge">
                        <i class="fas fa-arrow-up" id="directionIcon"></i>
                        <span id="directionText">UP</span>
                    </div>

                    <div class="gauge-container">
                        <svg class="gauge-svg">
                            <circle class="gauge-bg" cx="70" cy="70" r="60"></circle>
                            <circle class="gauge-fill" id="gaugeFill" cx="70" cy="70" r="60"></circle>
                            <defs>
                                <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#6366f1" />
                                    <stop offset="100%" stop-color="#a855f7" />
                                </linearGradient>
                            </defs>
                        </svg>
                        <div class="gauge-text">
                            <div class="percent" id="probabilityPercent">0%</div>
                            <div class="label" id="probabilityLabel">Сила</div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="action-btn" id="signalActionButton" onclick="generateSignal()">ОТРИМАТИ СИГНАЛ</button>
            <div style="margin-top: 16px;"></div>
            
            <div class="widget-card">
                <div id="tradingview_widget" style="width: 100%; height: 100%;"></div>
            </div>
        </div>

        <div id="tab-hub" class="tab-content">
            <div class="section-title">
                <i class="fas fa-newspaper" style="color: #6366f1"></i>
                <span id="newsSectionTitle">Економічні події</span>
            </div>
            <div id="newsContainer"></div>

            <div class="section-title">
                <i class="fas fa-graduation-cap" style="color: #a855f7"></i>
                <span id="eduSectionTitle">Академія трейдингу</span>
            </div>
            <div id="eduContainer"></div>
        </div>

        <div id="tab-profile" class="tab-content">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatarText">U</div>
                <h3 id="profileName">Username</h3>
                <p style="color: #22c55e; font-size: 12px; margin-top: 4px; font-weight: 500;" id="profileStatus">Premium Account</p>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <i class="fas fa-wallet" style="color: #6366f1"></i>
                    <div class="stat-value" id="balanceValue">0.00 ₴</div>
                    <div class="stat-label" id="balanceLabel">Мій Баланс</div>
                </div>
                <div class="stat-item">
                    <i class="fas fa-chart-line" style="color: #a855f7"></i>
                    <div class="stat-value" id="signalsCountValue">0</div>
                    <div class="stat-label" id="signalsCountLabel">Запитів за добу</div>
                </div>
            </div>

            <button class="action-btn" style="background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); box-shadow: none;" id="withdrButton" onclick="handleWithdraw()">ВИВЕСТИ КОШТИ</button>
        </div>

    </div>

    <div class="modal" id="assetModal" onclick="closeAssetModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modalSelectTitle">Оберіть актив</h3>
                <i class="fas fa-times" style="cursor: pointer; color: var(--text-muted)" onclick="closeAssetModal()"></i>
            </div>
            <div class="search-box">
                <i class="fas fa-search" style="color: var(--text-muted); margin-top: 2px;"></i>
                <input type="text" id="assetSearchInput" placeholder="Пошук активу..." oninput="filterAssets()">
            </div>
            <div id="assetsListContainer"></div>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item active" id="nav-signals-btn" onclick="switchTab('signals')">
            <i class="fas fa-chart-pie"></i>
            <span id="navSignalsText">Сигнали</span>
        </div>
        <div class="nav-item" id="nav-hub-btn" onclick="switchTab('hub')">
            <i class="fas fa-brain"></i>
            <span id="navHubText">Хаб</span>
        </div>
        <div class="nav-item" id="nav-profile-btn" onclick="switchTab('profile')">
            <i class="fas fa-user"></i>
            <span id="navProfileText">Кабінет</span>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://butovski-signal-bot.onrender.com/"; // Вкажіть ваше актуальне посилання на Render
        
        let currentLang = 'uk';
        const languagesList = ['uk', 'en', 'pl', 'de'];
        let currentTheme = 'cyberpunk';
        let isSignalActive = false;
        let localSignalsCount = 0;

        // РОЗШИРЕНИЙ СПИСОК АКТИВІВ (28+ штук)
        const assetsData = [
            // Мажори
            { id: "FX:EURUSD", name: "EUR / USD", type: "forex", icon: "€" },
            { id: "FX:GBPUSD", name: "GBP / USD", type: "forex", icon: "£" },
            { id: "FX:USDJPY", name: "USD / JPY", type: "forex", icon: "¥" },
            { id: "FX:AUDUSD", name: "AUD / USD", type: "forex", icon: "A$" },
            { id: "FX:USDCAD", name: "USD / CAD", type: "forex", icon: "C$" },
            { id: "FX:USDCHF", name: "USD / CHF", type: "forex", icon: "₣" },
            { id: "FX:NZDUSD", name: "NZD / USD", type: "forex", icon: "N$" },
            // Кроси
            { id: "FX:EURGBP", name: "EUR / GBP", type: "forex", icon: "₠" },
            { id: "FX:EURJPY", name: "EUR / JPY", type: "forex", icon: "₭" },
            { id: "FX:GBPJPY", name: "GBP / JPY", type: "forex", icon: "ℒ" },
            { id: "FX:AUDJPY", name: "AUD / JPY", type: "forex", icon: "ℳ" },
            { id: "FX:EURAUD", name: "EUR / AUD", type: "forex", icon: "₧" },
            { id: "FX:GBPCAD", name: "GBP / CAD", type: "forex", icon: "💱" },
            // Екзотика
            { id: "OANDA:USDTRY", name: "USD / TRY", type: "forex", icon: "₺" },
            { id: "OANDA:USDZAR", name: "USD / ZAR", type: "forex", icon: "R" },
            { id: "OANDA:USDMXN", name: "USD / MXN", type: "forex", icon: "Mex" },
            { id: "OANDA:EURSEK", name: "EUR / SEK", type: "forex", icon: "kr" },
            // Крипта
            { id: "BINANCE:BTCUSDT", name: "BTC / USDT", type: "crypto", icon: "₿" },
            { id: "BINANCE:ETHUSDT", name: "ETH / USDT", type: "crypto", icon: "Ξ" },
            { id: "BINANCE:SOLUSDT", name: "SOL / USDT", type: "crypto", icon: "☀️" },
            { id: "BINANCE:TONUSDT", name: "TON / USDT", type: "crypto", icon: "💎" },
            { id: "BINANCE:XRPUSDT", name: "XRP / USDT", type: "crypto", icon: "✕" },

            { id: "BINANCE:ADAUSDT", name: "ADA / USDT", type: "crypto", icon: "₳" },
            { id: "BINANCE:DOGEUSDT", name: "DOGE / USDT", type: "crypto", icon: "Ð" },
            // Метали та Сировина
            { id: "FOREXCOM:XAUUSD", name: "GOLD (XAU/USD)", type: "cfd", icon: "Au" },
            { id: "FOREXCOM:XAGUSD", name: "SILVER (XAG/USD)", type: "cfd", icon: "Ag" },
            { id: "FOREXCOM:USOIL", name: "Crude Oil WTI", type: "cfd", icon: "🛢️" }
        ];

        const timeframesData = [
            { id: "3s", name: "3s", value: "0.05", tvWidget: "1" },
            { id: "15s", name: "15s", value: "0.25", tvWidget: "1" },
            { id: "30s", name: "30s", value: "0.5", tvWidget: "1" },
            { id: "1m", name: "1m", value: "1", tvWidget: "1" },
            { id: "5m", name: "5m", value: "5", tvWidget: "5" },
            { id: "15m", name: "15m", value: "15", tvWidget: "15" },
            { id: "30m", name: "30m", value: "30", tvWidget: "30" },
            { id: "1h", name: "1h", value: "60", tvWidget: "60" }
        ];

        let selectedAsset = assetsData[0];
        let selectedTimeframe = timeframesData[3];

        // 100% ПОВНІ СЛОВНИКИ ПЕРЕКЛАДІВ БЕЗ ПРОПУСКІВ
        const translations = {
            uk: {
                statusLabel: "Преміум Активовано",
                placeholderText: "Оберіть актив, інтервал та надішліть запит на аналіз",
                signalActionButton: "ОТРИМАТИ СИГНАЛ",

        async function syncUserWithDatabase() {
            if (!initData) return;
            try {
                const res = await fetch(`${BACKEND_URL}/api/user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: initData })
                });
                const data = await res.json();
                if (data.success && data.user) {
                    document.getElementById('balanceValue').innerText = parseFloat(data.user.balance).toFixed(2) + " ₴";
                }
            } catch(err) { console.error(err); }
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderTimeframes();
            buildAssetDropdown();
            renderHubContent();
            switchTab('signals');
            syncUserWithDatabase();
        });

        function renderTimeframes() {
            const container = document.getElementById('timeframeContainer');
            container.innerHTML = "";
            timeframesData.forEach(tf => {
                const btn = document.createElement('button');
                btn.className = `tf-btn ${tf.id === selectedTimeframe.id ? 'active' : ''}`;
                btn.innerText = tf.name;
                btn.onclick = () => selectTimeframe(tf);
                container.appendChild(btn);
            });
        }

        function selectTimeframe(tf) {
            if (isSignalActive) return;
            selectedTimeframe = tf;
            renderTimeframes();
            initTradingViewWidget(currentTheme, selectedAsset.id, tf.tvWidget);
        }

        function buildAssetDropdown() {
            const container = document.getElementById('assetsListContainer');
            container.innerHTML = "";
            assetsData.forEach(asset => {
                const isSel = asset.id === selectedAsset.id;
                const div = document.createElement('div');
                div.className = `asset-option ${isSel ? 'selected' : ''}`;
                div.onclick = () => selectAsset(asset);
                div.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div class="asset-icon">${asset.icon}</div>
                        <div>
                            <div style="font-size:14px; font-weight:600;">${asset.name}</div>
                            <div style="font-size:11px; color:var(--text-muted);">${translations[currentLang][asset.type]}</div>
                        </div>
                    </div>
                    ${isSel ? '<i class="fas fa-check" style="color:#6366f1;"></i>' : ''}
                `;
                container.appendChild(div);
            });
        }

        function selectAsset(asset) {
            selectedAsset = asset;
            document.getElementById('currentAssetIcon').innerText = asset.icon;
            document.getElementById('currentAssetTitle').innerText = asset.name;
            document.getElementById('currentAssetType').innerText = translations[currentLang][asset.type];
            closeAssetModal();
            buildAssetDropdown();
            initTradingViewWidget(currentTheme, asset.id, selectedTimeframe.tvWidget);
        }

        async function generateSignal() {
            const btn = document.getElementById('signalActionButton');
            
            if (isSignalActive) {
                isSignalActive = false;
                document.getElementById('signalResult').style.display = 'none';
                document.getElementById('monitorPlaceholder').style.display = 'block';
                document.getElementById('gaugeFill').style.strokeDashoffset = '377';
                btn.innerText = translations[currentLang].signalActionButton;
                return;
            }

            document.getElementById('monitorPlaceholder').style.display = 'none';
            document.getElementById('signalResult').style.display = 'none';
            const loader = document.getElementById('loaderContainer');
            loader.style.display = 'flex';
            
            const steps = hubContent.steps[currentLang];
            let stepIdx = 0;
            document.getElementById('loaderSteps').innerText = steps[0];
            const intervalTimer = setInterval(() => {
                stepIdx++;
                if(stepIdx < steps.length) {
                    document.getElementById('loaderSteps').innerText = steps[stepIdx];
                }
            }, 650);

            try {
                const response = await fetch(`${BACKEND_URL}/api/get_signal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        symbol: selectedAsset.id,
                        timeframe: selectedTimeframe.value
                    })
                });

                clearInterval(intervalTimer);
                loader.style.display = 'none';

                const data = await response.json();

                if (data.success) {
                    isSignalActive = true;
                    btn.innerText = translations[currentLang].signalActionButtonNew;

                    const badge = document.getElementById('directionBadge');
                    const icon = document.getElementById('directionIcon');
                    const text = document.getElementById('directionText');
                    
                    if (data.direction === 'UP') {
                        badge.className = "direction-badge up";
                        icon.className = "fas fa-arrow-up";
                        text.innerText = translations[currentLang].buyText;
                    } else {
                        badge.className = "direction-badge down";
                        icon.className = "fas fa-arrow-down";
                        text.innerText = translations[currentLang].sellText;
                    }

                    document.getElementById('signalResult').style.display = 'block';
                    document.getElementById('probabilityPercent').innerText = data.probability + '%';
                    
                    const offset = 377 - (377 * data.probability) / 100;
                    setTimeout(() => {
                        document.getElementById('gaugeFill').style.strokeDashoffset = offset;
                    }, 50);

                    localSignalsCount++;
                    document.getElementById('signalsCountValue').innerText = localSignalsCount;
                } else {
                    alert("Error: " + data.error);
                    document.getElementById('monitorPlaceholder').style.display = 'block';
                }
            } catch (error) {
                clearInterval(intervalTimer);
                loader.style.display = 'none';
                document.getElementById('monitorPlaceholder').style.display = 'block';
                alert(translations[currentLang].errConnect);
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`nav-${tabId}-btn`).classList.add('active');

            if(tabId === 'signals') {
                setTimeout(() => {
                    initTradingViewWidget(currentTheme, selectedAsset.id, selectedTimeframe.tvWidget);
                }, 100);
            }
        }

        function toggleTheme() {
            currentTheme = (currentTheme === 'cyberpunk') ? 'light' : 'cyberpunk';
            document.documentElement.setAttribute('data-theme', currentTheme);
            const icon = document.getElementById('themeIcon');
            icon.className = (currentTheme === 'light') ? "fas fa-sun" : "fas fa-moon";
            initTradingViewWidget(currentTheme, selectedAsset.id, selectedTimeframe.tvWidget);
        }

        function handleWithdraw() { alert(translations[currentLang].withdrawAlert); }

        function filterAssets() {
            const query = document.getElementById('assetSearchInput').value.toLowerCase();
            document.querySelectorAll('.asset-option').forEach(opt => {
                opt.style.display = opt.innerText.toLowerCase().includes(query) ? "flex" : "none";
            });

        function initTradingViewWidget(theme, asset, timeframe) {
            document.getElementById('tradingview_widget').innerHTML = "";
            if (typeof TradingView !== 'undefined') {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": asset,
                    "interval": timeframe,
                    "timezone": "Etc/UTC",
                    "theme": (theme === 'light') ? 'light' : 'dark',
                    "style": "1",
                    "locale": currentLang,
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_legend": true,
                    "save_image": false,
                    "container_id": "tradingview_widget"
                });
            }
