<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butovski App v2.8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Теми оформлення через CSS змінні */
        :root, [data-theme="cyberpunk"] {
            --bg-color: #0d0f14;
            --card-bg: #141822;
            --accent-gradient: linear-gradient(135deg, #6366f1, #a855f7);
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: #232a3d;
            --nav-bg: #0a0c10;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #1d4ed8);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --nav-bg: #ffffff;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }

        [data-theme="emerald"] {
            --bg-color: #064e3b;
            --card-bg: #065f46;
            --accent-gradient: linear-gradient(135deg, #10b981, #059669);
            --text-main: #ecfdf5;
            --text-muted: #a7f3d0;
            --border-color: #047857;
            --nav-bg: #022c22;
            --success-color: #34d399;
            --danger-color: #f87171;
            --warning-color: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            padding-bottom: 75px;
            overflow-x: hidden;
        }

        .container {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Хедер */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-weight: 700;
            font-size: 20px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Кастомні випадаючі списки */
        .selectors-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .custom-select-wrapper {
            position: relative;
            user-select: none;
        }

        .custom-select-trigger {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 14px;
        }

        .custom-options {
            position: absolute;
            display: none;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-top: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .custom-options.open {
            display: block;
        }

        .custom-option {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .custom-option:hover, .custom-option.selected {
            background: var(--border-color);
            color: var(--text-main);
        }

        /* Віджет графіка */
        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px;
            height: 300px;
            margin-bottom: 20px;
            position: relative;
        }

        #tradingview_widget {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
        }

        /* Головна картка робота */
        .robot-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        .signal-output {
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .status-text {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .signal-result {
            font-size: 28px;
            font-weight: 700;
        }

        .signal-indicators-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 500;
        }

        .signal-up { color: var(--success-color); }
        .signal-down { color: var(--danger-color); }

        /* Прогрес бар */
        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            margin: 15px 0;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent-gradient);
            width: 0%;
            transition: width 0.1s linear;
        }

        .market-btn {
            width: 100%;
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        /* Калькулятор Мартингейла */
        .calc-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
        }

        .input-wrapper input {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 12px 12px 12px 40px;
            border-radius: 10px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
        }

        .calc-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .calc-table th, .calc-table td {
            padding: 10px;
            text-align: left;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
        }

        .calc-table th {
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Налаштування / Профіль */
        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-row:last-child {
            border-bottom: none;
        }

        .setting-info h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .setting-info p {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Екрани */
        .app-screen {
            display: none;
        }

        .app-screen.active {
            display: block;
        }

        /* Нижнє меню навігації */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--nav-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            background: none;
            border: none;
            gap: 4px;
        }

        .nav-item i {
            font-size: 18px;
        }

        .nav-item.active {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">BUTOVSKI BOT</div>
            <div style="font-size: 11px; color: var(--text-muted); font-weight:600;">v2.8</div>
        </header>

        <div id="screen-signals" class="app-screen active">
            <div class="selectors-grid">
                <div class="custom-select-wrapper" id="assetSelectWrapper">
                    <div class="custom-select-trigger" id="assetTrigger">
                        <span id="selectedAsset">EUR/USD</span> <i class="fa-solid fa-chevron-down"></i>
                    </div>
                    <div class="custom-options" id="assetOptions"></div>
                </div>

                <div class="custom-select-wrapper" id="tfSelectWrapper">
                    <div class="custom-select-trigger" id="tfTrigger">
                        <span id="selectedTF">5 MIN</span> <i class="fa-solid fa-chevron-down"></i>
                    </div>
                    <div class="custom-options" id="tfOptions">
                        <div class="custom-option selected" data-value="1">1 MIN</div>
                        <div class="custom-option" data-value="5">5 MIN</div>
                        <div class="custom-option" data-value="15">15 MIN</div>
                        <div class="custom-option" data-value="60">1 HOUR</div>
                    </div>
                </div>
            </div>

            <div class="chart-card">
                <div id="tradingview_widget"></div>
            </div>

            <div class="robot-card">
                <div class="signal-output">
                    <div class="status-text" id="statusText">Робот готовий до аналізу</div>
                    <div class="signal-result" id="signalResult">—</div>
                    <div class="signal-indicators-sub" id="signalIndicatorsSub"></div>
                </div>

                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <button class="market-btn" id="signalActionButton" onclick="processSignalAction()">ОТРИМАТИ СИГНАЛ</button>
            </div>
        </div>

        <div id="screen-calculator" class="app-screen">
            <div class="calc-card">
                <div class="input-group">
                    <label id="lblStartBet">Початкова ставка ($)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-dollar-sign"></i>
                        <input type="number" id="startBet" value="1" oninput="calculateMartingale()">
                    </div>
                </div>
                <div class="input-group">
                    <label id="lblMultiplier">Множник ступеня</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-xmark"></i>
                        <input type="number" id="multiplier" value="2.2" step="0.1" oninput="calculateMartingale()">
                    </div>
                </div>

                <table class="calc-table">
                    <thead>
                        <tr>
                            <th id="thStep">Крок</th>
                            <th id="thBet">Ставка</th>
                            <th id="thTotal">Всього</th>
                        </tr>
                    </thead>
                    <tbody id="martingaleResult">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="screen-settings" class="app-screen">
            <div class="profile-card">
                <div class="setting-row">
                    <div class="setting-info">
                        <h4 id="setLangTitle">Мова інтерфейсу</h4>
                        <p id="setLangDesc">Зміна мови відображення застосунку</p>
                    </div>
                    <div class="custom-select-wrapper" style="width: 110px;">
                        <div class="custom-select-trigger" id="langTrigger" style="padding: 8px 12px; font-size:12px;">
                            <span id="selectedLang">UA</span> <i class="fa-solid fa-chevron-down"></i>
                        </div>
                        <div class="custom-options" id="langOptions">
                            <div class="custom-option selected" data-value="uk">UA</div>
                            <div class="custom-option" data-value="en">EN</div>
                        </div>
                    </div>
                </div>

                <div class="setting-row">
                    <div class="setting-info">
                        <h4 id="setThemeTitle">Колірна схема</h4>
                        <p id="setThemeDesc">Оберіть візуальну тему інтерфейсу</p>
                    </div>
                    <div class="custom-select-wrapper" style="width: 130px;">
                        <div class="custom-select-trigger" id="themeTrigger" style="padding: 8px 12px; font-size:12px;">
                            <span id="selectedTheme">Cyberpunk</span> <i class="fa-solid fa-chevron-down"></i>
                        </div>
                        <div class="custom-options" id="themeOptions">
                            <div class="custom-option selected" data-value="cyberpunk">Cyberpunk</div>
                            <div class="custom-option" data-value="light">Light Day</div>
                            <div class="custom-option" data-value="emerald">Emerald</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchScreen('signals', this)">
            <i class="fa-solid fa-chart-line"></i>
            <span id="navSignals">Сигнали</span>
        </button>
        <button class="nav-item" onclick="switchScreen('calculator', this)">
            <i class="fa-solid fa-calculator"></i>
            <span id="navCalc">Калькулятор</span>
        </button>
        <button class="nav-item" onclick="switchScreen('settings', this)">
            <i class="fa-solid fa-gear"></i>
            <span id="navSettings">Налаштування</span>
        </button>
    </nav>

    <script>
        // Ініціалізація Telegram Web App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        // База даних активів
        const assets = ["EUR/USD", "GBP/USD", "USD/JPY", "AUD/USD", "BTC/USD", "ETH/USD"];
        let currentAsset = "FX:EURUSD";
        let currentTimeframe = "5";
        let currentLang = "uk";
        let currentTheme = "cyberpunk";
        let isSignalActive = false;
        
        // Масив для збереження історії сигналів (Пункт 2)
        let signalHistory = [];

        // Переклади локалізації з новими текстовими токенами
        const translations = {
            uk: {
                statusText: "Робот готовий до аналізу",
                statusScanning: "Сканування ринку...",
                statusResult: "Аналіз завершено",
                signalActionButton: "ОТРИМАТИ СИГНАЛ",
                signalActionButtonNew: "НОВИЙ СИГНАЛ",
                navSignals: "Сигнали",
                navCalc: "Калькулятор",
                navSettings: "Налаштування",
                lblStartBet: "Початкова ставка ($)",
                lblMultiplier: "Множник ступеня",
                thStep: "Крок", thBet: "Ставка", thTotal: "Всього",
                setLangTitle: "Мова інтерфейсу",
                setLangDesc: "Зміна мови відображення застосунку",
                setThemeTitle: "Колірна схема",
                setThemeDesc: "Оберіть візуальну тему інтерфейсу",
                txtUp: "ВВЕРХ", txtDown: "ВНИЗ"
            },
            en: {
                statusText: "Robot ready for analysis",
                statusScanning: "Scanning the market...",
                statusResult: "Analysis completed",
                signalActionButton: "GET SIGNAL",
                signalActionButtonNew: "NEW SIGNAL",
                navSignals: "Signals",
                navCalc: "Calculator",
                navSettings: "Settings",
                lblStartBet: "Initial Bet ($)",
                lblMultiplier: "Step Multiplier",
                thStep: "Step", thBet: "Bet", thTotal: "Total",
                setLangTitle: "Interface Language",
                setLangDesc: "Change the app display language",
                setThemeTitle: "Color Scheme",
                setThemeDesc: "Choose interface visual theme",
                txtUp: "CALL / UP", txtDown: "PUT / DOWN"
            }
        };

        // Функція відтворення звуку через Web Audio API (Пункт 3)
        function playSignalSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ctx.currentTime); 
                osc.frequency.setValueAtTime(880.00, ctx.currentTime + 0.1); 
                
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            } catch (e) {
                console.log("Audio Error: " + e);
            }
        }

        // Налаштування роботи кастомних списків
        function setupDropdown(triggerId, optionsId, onSelectCallback) {
            const trigger = document.getElementById(triggerId);
            const options = document.getElementById(optionsId);

            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                closeAllDropdowns();
                options.classList.toggle('open');
            });

            options.querySelectorAll('.custom-option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    options.querySelectorAll('.custom-option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    options.classList.remove('open');
                    if(onSelectCallback) onSelectCallback(opt);
                });
            });
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.custom-options').forEach(o => o.classList.remove('open'));
        }

        document.addEventListener('click', closeAllDropdowns);

        // Будуємо список валютних пар
        function buildAssetDropdown() {
            const container = document.getElementById('assetOptions');
            container.innerHTML = "";
            assets.forEach(asset => {
                const opt = document.createElement('div');
                opt.className = "custom-option" + (currentAsset.endsWith(asset.replace('/','')) ? " selected" : "");
                opt.innerText = asset;
                opt.setAttribute('data-value', asset);
                opt.addEventListener('click', () => {
                    document.getElementById('selectedAsset').innerText = asset;
                    let prefix = "FX:";
                    if(asset.includes('BTC') || asset.includes('ETH')) prefix = "BINANCE:";
                    currentAsset = prefix + asset.replace('/', '');
                    initTradingViewWidget(currentTheme, currentAsset, currentTimeframe);
                });
                container.appendChild(opt);
            });
        }

        // Перемикання екранів меню
        function switchScreen(screenId, navElement) {
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(`screen-${screenId}`).classList.add('active');
            navElement.classList.add('active');
        }

        // Логіка кнопки отримання/скидання сигналу
        function processSignalAction() {
            const btn = document.getElementById('signalActionButton');
            const t = translations[currentLang];

            if (isSignalActive) {
                isSignalActive = false;
                document.getElementById('signalResult').innerText = "—";
                document.getElementById('signalResult').className = "signal-result";
                document.getElementById('signalIndicatorsSub').innerText = "";
                document.getElementById('statusText').innerText = t.statusText;
                btn.innerText = t.signalActionButton;
            } else {
                isSignalActive = true;
                btn.disabled = true;
                document.getElementById('statusText').innerText = t.statusScanning;
                document.getElementById('signalResult').innerText = "—";
                document.getElementById('signalIndicatorsSub').innerText = "";
                
                const progressContainer = document.getElementById('progressContainer');
                const progressBar = document.getElementById('progressBar');
                progressContainer.style.display = "block";
                progressBar.style.width = "0%";

                let progress = 0;
                const interval = setInterval(() => {
                    progress += 4;
                    progressBar.style.width = `${progress}%`;
                    if (progress >= 100) {
                        clearInterval(interval);
                        progressContainer.style.display = "none";
                        btn.disabled = false;
                        generateSignalOutput();
                    }
                }, 100);
            }
        }

        // Генерація фінального результату та запуск нових систем (Пункт 1, 2, 3)
        function generateSignalOutput() {
            const t = translations[currentLang];
            const isUp = Math.random() > 0.45;
            const probability = Math.floor(Math.random() * 21) + 70;
            const directionText = isUp ? t.txtUp : t.txtDown;
            
            document.getElementById('statusText').innerText = t.statusResult;
            
            const resEl = document.getElementById('signalResult');
            resEl.innerText = `${directionText} (${probability}%)`;
            resEl.className = `signal-result ${isUp ? 'signal-up' : 'signal-down'}`;
            
            // 1. Інтеграція під-індикаторів прямо у ваш блок виводу сигналу
            const subEl = document.getElementById('signalIndicatorsSub');
            if (isUp) {
                subEl.innerHTML = "RSI: Oversold 🟢 | MACD: Bull Cross 🟢 | STOCH: Buy 🟢";
            } else {
                subEl.innerHTML = "RSI: Overbought 🔴 | MACD: Bear Cross 🔴 | STOCH: Sell 🔴";
            }

            document.getElementById('signalActionButton').innerText = t.signalActionButtonNew || "НОВИЙ СИГНАЛ";

            // 3. Звукове сповіщення
            playSignalSound();

            // 2. Логування та збереження результату в історію
            const logEntry = {
                time: new Date().toLocaleTimeString(),
                asset: document.getElementById('selectedAsset').innerText,
                direction: directionText,
                prob: probability
            };
            signalHistory.push(logEntry);
            console.log("Signal History Added:", logEntry);
        }

        // Розрахунок калькулятора Мартингейла
        function calculateMartingale() {
            const startBet = parseFloat(document.getElementById('startBet').value) || 0;
            const multiplier = parseFloat(document.getElementById('multiplier').value) || 0;
            const tbody = document.getElementById('martingaleResult');
            
            tbody.innerHTML = "";
            let currentBet = startBet;
            let totalAccumulated = 0;

            for (let i = 1; i <= 6; i++) {
                totalAccumulated += currentBet;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i}</td>
                    <td>$${currentBet.toFixed(2)}</td>
                    <td>$${totalAccumulated.toFixed(2)}</td>
                `;
                tbody.appendChild(row);
                currentBet *= multiplier;
            }
        }

        // Оригінальний цикл зміни мови
        function updateLanguageInterface() {
            const t = translations[currentLang];
            for (let key in t) {
                const el = document.getElementById(key);
                if (el) el.innerText = t[key];
            }
            
            const btn = document.getElementById('signalActionButton');
            if (isSignalActive) {
                btn.innerText = t.signalActionButtonNew || "НОВИЙ СИГНАЛ";
            } else {
                btn.innerText = t.signalActionButton || "ОТРИМАТИ СИГНАЛ";
            }
            
            buildAssetDropdown();
        }

        // Ініціалізація віджета TradingView
        function initTradingViewWidget(theme, asset, timeframe) {
            document.getElementById('tradingview_widget').innerHTML = "";
            if (typeof TradingView !== 'undefined') {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": asset,
                    "interval": timeframe,
                    "timezone": "Etc/UTC",
                    "theme": (theme === 'light') ? 'light' : 'dark',
                    "style": "1",
                    "locale": currentLang,
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_legend": true,
                    "save_image": false,
                    "container_id": "tradingview_widget"
                });
            }
        }

        // Стартова ініціалізація подій та списків
        window.addEventListener('DOMContentLoaded', () => {
            buildAssetDropdown();
            calculateMartingale();
            initTradingViewWidget(currentTheme, currentAsset, currentTimeframe);

            // Налаштування селекторів таймфреймів
            setupDropdown('tfTrigger', 'tfOptions', (opt) => {
                const tf = opt.getAttribute('data-value');
                document.getElementById('selectedTF').innerText = opt.innerText;
                currentTimeframe = tf;
                initTradingViewWidget(currentTheme, currentAsset, currentTimeframe);
            });

            // Налаштування зміни мови
            setupDropdown('langTrigger', 'langOptions', (opt) => {
                currentLang = opt.getAttribute('data-value');
                document.getElementById('selectedLang').innerText = opt.innerText;
                updateLanguageInterface();
                initTradingViewWidget(currentTheme, currentAsset, currentTimeframe);
            });

            // Налаштування зміни теми
            setupDropdown('themeTrigger', 'themeOptions', (opt) => {
                const theme = opt.getAttribute('data-value');
                document.getElementById('selectedTheme').innerText = opt.innerText;
                document.documentElement.setAttribute('data-theme', theme);
                currentTheme = theme;
                initTradingViewWidget(currentTheme, currentAsset, currentTimeframe);
            });
        });
    </script>
</body>
</html>
